org.gradle.configuration-cache=true
org.gradle.caching=true
# Gradle daemon heap.
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
# Kotlin compile daemon heap — the main module (IntelliJ platform + brikk-sql) OOMs the
# default; 4g compiles it comfortably.
kotlin.daemon.jvmargs=-Xmx4g
# brikk-sql-jvm.jar is compiled against kotlin-stdlib 2.3.21 (toolchain-resolved); we pin that
# exact stdlib explicitly in build.gradle.kts instead of relying on KGP's default injection.
kotlin.stdlib.default.dependency=false
