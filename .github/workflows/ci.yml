name: CI

on:
  push:
    branches: [ main, 'release-*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/

  release:
    name: GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download plugin zip
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip
          path: dist

      - name: Read version from build.gradle.kts
        id: ver
        run: |
          V=$(sed -n 's/^version = "\(.*\)"/\1/p' build.gradle.kts | head -1)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "version: $V"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          ZIP=$(ls dist/*.zip | head -1)
          RENAMED="dist/sql-transpiler-intellij-plugin-${V}.zip"
          mv "$ZIP" "$RENAMED"
          if gh release view "v$V" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "v$V" "$RENAMED" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "v$V" "$RENAMED" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "SQL Transpiler $V" \
              --notes "Plugin zip for manual installation (Settings → Plugins → ⚙ → Install Plugin from Disk).
          Built from \`$GITHUB_REF_NAME\` @ $GITHUB_SHA. See plugin.xml change-notes for details."
          fi
